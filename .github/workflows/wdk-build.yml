name: WDK Build

on:
  pull_request:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Release x64
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install Windows Driver Kit
        shell: pwsh
        run: choco install windowsdriverkit10 --yes --no-progress

      - name: Build solution
        shell: pwsh
        run: msbuild Nidhogg.sln /t:Build /m /p:Configuration=Release /p:Platform=x64 /p:SignMode=Off /p:DeployOnBuild=false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            **/*.sys
            **/*.exe
            **/*.cat
            **/*.inf
          if-no-files-found: warn
