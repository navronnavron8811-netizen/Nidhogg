name: WDK Build

on:
  pull_request:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Release x64
    runs-on: windows-2022
    timeout-minutes: 60   # жёсткий лимит на весь job, чтобы не висел часами

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install Windows Driver Kit
        shell: pwsh
        timeout-minutes: 25   # даём установке WDK разумный лимит времени
        run: |
          choco install windowsdriverkit10 --yes --no-progress --timeout 1200
        continue-on-error: false

      - name: Verify WDK installation
        shell: pwsh
        run: |
          $wdkPath = "C:\Program Files (x86)\Windows Kits\10"
          if (-not (Test-Path $wdkPath)) {
            Write-Error "WDK не установлен по ожидаемому пути: $wdkPath"
            exit 1
          }
          Write-Host "WDK найден: $wdkPath"

      - name: Build solution
        shell: pwsh
        timeout-minutes: 20
        run: msbuild Nidhogg.sln /t:Build /m /p:Configuration=Release /p:Platform=x64 /p:SignMode=Off /p:DeployOnBuild=false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            **/*.sys
            **/*.exe
            **/*.cat
            **/*.inf
          if-no-files-found: warn
